<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background transparent -->
  <rect width="256" height="256" fill="none"/>

  <!-- ══════════════════════════════════════════
       ISOMETRIC CUBE — matching the Intelli IPS logo
       Layout: top face (light/white), left face (white), right face (blue)
       ══════════════════════════════════════════ -->

  <!-- Top face of cube (white/light) -->
  <polygon points="128,38 210,80 128,122 46,80" fill="#FFFFFF" stroke="#1a1a4e" stroke-width="4" stroke-linejoin="round"/>

  <!-- Left face of cube (white) -->
  <polygon points="46,80 128,122 128,216 46,174" fill="#F0F0F8" stroke="#1a1a4e" stroke-width="4" stroke-linejoin="round"/>

  <!-- Right face of cube (blue) -->
  <polygon points="128,122 210,80 210,174 128,216" fill="#4A6FD4" stroke="#1a1a4e" stroke-width="4" stroke-linejoin="round"/>

  <!-- ══════════════════════════════════════════
       EYE on top face (rotated to match isometric perspective)
       ══════════════════════════════════════════ -->
  <g transform="translate(128,80) rotate(0)">
    <!-- Eye oval shape -->
    <ellipse cx="0" cy="0" rx="30" ry="16" fill="#1a1a4e"/>
    <!-- White inner -->
    <ellipse cx="0" cy="0" rx="22" ry="10" fill="#FFFFFF"/>
    <!-- Pupil / 4-star spark -->
    <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#1a1a4e"/>
  </g>

  <!-- ══════════════════════════════════════════
       "INTELLI" text on left (white) face
       ══════════════════════════════════════════ -->
  <g transform="skewY(30) translate(0,-46)">
    <text
      x="80"
      y="198"
      font-family="Arial Black, Arial, sans-serif"
      font-size="20"
      font-weight="900"
      fill="#1a1a4e"
      letter-spacing="1"
    >INTELLI</text>
  </g>

  <!-- ══════════════════════════════════════════
       "IPS" text on right (blue) face — skewed to match right face
       ══════════════════════════════════════════ -->
  <g transform="skewY(-30) translate(0,46)">
    <text
      x="147"
      y="90"
      font-family="Arial, sans-serif"
      font-size="11"
      font-weight="700"
      fill="#FFFFFF"
      letter-spacing="0.5"
    >INTRUSION</text>
    <text
      x="143"
      y="105"
      font-family="Arial, sans-serif"
      font-size="11"
      font-weight="700"
      fill="#FFFFFF"
      letter-spacing="0.5"
    >PREVENTION</text>
    <text
      x="148"
      y="120"
      font-family="Arial, sans-serif"
      font-size="11"
      font-weight="700"
      fill="#FFFFFF"
      letter-spacing="0.5"
    >SYSTEM ✦</text>
  </g>

</svg>