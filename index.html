
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelli IPS - Intrusion Prevention System</title>
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="shortcut icon" type="image/png" href="/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans:wght@400;500;700;900&family=VT323&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        "primary": "#333333",
                        "primary-dark": "#000000",
                        "background-light": "#f0f0f0",
                        "background-dark": "#000000",
                        "surface-dark": "#111111",
                        "surface-highlight": "#333333",
                        "text-main": "#ffffff",
                        "text-muted": "#9ca3af",
                    },
                    backgroundColor: {
                        "background": "var(--bg-background)",
                        "surface": "var(--bg-surface)",
                        "surface-highlight": "var(--bg-surface-highlight)",
                    },
                    textColor: {
                        "main": "var(--text-main)",
                        "muted": "var(--text-muted)",
                    },
                    borderColor: {
                        "surface": "var(--border-surface)",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                        "pixel": ["'VT323'", "monospace"],
                    },
                    borderRadius: {
                        "DEFAULT": "0",
                        "lg": "0",
                        "xl": "0",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        :root {
            --bg-background: #000000;
            --bg-surface: #111111;
            --bg-surface-highlight: #333333;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border-surface: #333333;
        }
        :root:not(.dark) {
            --bg-background: #f0f0f0;
            --bg-surface: #ffffff;
            --bg-surface-highlight: #e5e5e5;
            --text-main: #000000;
            --text-muted: #6b7280;
            --border-surface: #d1d5db;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-background); 
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-surface-highlight); 
            border: 1px solid var(--bg-background);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--bg-surface); 
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            image-rendering: pixelated;
        }
        .pixel-icon {
            image-rendering: pixelated;
            font-smooth: never;
            -webkit-font-smoothing: none;
        }

        /* Print / PDF Export Styling */
        @media print {
            body {
                background-color: #000 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            aside, header, .no-print, button {
                display: none !important;
            }
            main {
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                height: auto !important;
                overflow: visible !important;
            }
            .flex-1 {
                overflow: visible !important;
            }
            /* Ensure the report content fills the page */
            #report-container {
                padding: 2cm !important;
            }
            .grid {
                display: block !important;
            }
            .grid > * {
                margin-bottom: 2rem !important;
                page-break-inside: avoid !important;
            }
            .bg-surface-dark {
                background-color: #111 !important;
                border: 1px solid #333 !important;
            }
            .text-white { color: white !important; }
            .text-gray-500 { color: #888 !important; }
            .text-gray-400 { color: #aaa !important; }
            .text-gray-300 { color: #ccc !important; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-background dark:bg-background-dark text-main dark:text-white font-display">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
