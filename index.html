<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Polyfill Node process global for SDKs like groq-sdk
        window.process = window.process || {
            env: { NODE_ENV: 'development' },
            version: 'v18.0.0',
            versions: { node: '18.0.0' },
            platform: 'browser',
            arch: 'x64'
        };
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelli IPS - Intrusion Prevention System</title>
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="shortcut icon" type="image/png" href="/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans:wght@400;500;700;900&family=VT323&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        "primary": "#4A6FD4",
                        "primary-dark": "#3a5eca",
                        "logo-accent": "#4A6FD4",
                        "logo-dark": "#3a5eca",
                        "background-light": "#eef0f3",
                        "background-dark": "#000000",
                        "surface-dark": "#0a0a0a",
                        "surface-highlight": "#171717",
                        "text-main": "var(--text-main)",
                        "text-muted": "var(--text-muted)",
                    },
                    backgroundColor: {
                        "background": "var(--bg-background)",
                        "surface": "var(--bg-surface)",
                        "surface-highlight": "var(--bg-surface-highlight)",
                    },
                    textColor: {
                        "main": "var(--text-main)",
                        "muted": "var(--text-muted)",
                    },
                    borderColor: {
                        "surface": "var(--border-surface)",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                        "pixel": ["'VT323'", "monospace"],
                    },
                    borderRadius: {
                        "none": "0px",
                        "sm": "0.125rem",
                        "DEFAULT": "0.375rem",
                        "md": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "2xl": "1.5rem",
                        "3xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        :root {
            --bg-background: #000000;
            --bg-surface: #0a0a0a;
            --bg-surface-highlight: #171717;
            --text-main: #f5f5f5;
            --text-muted: #737373;
            --border-surface: #262626;
        }
        :root:not(.dark) {
            --bg-background: #eef0f3;
            --bg-surface: #ffffff;
            --bg-surface-highlight: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #737373;
            --border-surface: #e5e5e5;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-background); 
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-surface-highlight); 
            border: 1px solid var(--bg-background);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--bg-surface); 
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            image-rendering: pixelated;
        }
        .pixel-icon {
            image-rendering: pixelated;
            font-smooth: never;
            -webkit-font-smoothing: none;
        }

        /* Print / PDF Export Styling */
        @media print {
            html, body, #root, .flex.h-screen, main, #report-container {
                height: auto !important;
                overflow: visible !important;
                position: static !important;
                background: #000000 !important;
                color: #ffffff !important;
            }
            .flex.h-screen {
                display: block !important;
            }
            aside, header, .no-print, button, a {
                display: none !important;
            }
            main {
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                display: block !important;
            }
            #report-container {
                padding: 1.5cm !important;
                display: block !important;
                width: 100% !important;
            }
            .print-grid-2 {
                display: grid !important;
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
                gap: 1.5rem !important;
            }
            .print-grid-6 {
                display: grid !important;
                grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
                gap: 1rem !important;
            }
            .grid > *, .bg-surface, table, tr {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }
            .chart-print-container {
                height: 300px !important;
                width: 100% !important;
            }
            .chart-print-container-pie {
                height: 220px !important;
                width: 100% !important;
            }
            .chart-print-container-roc {
                height: 220px !important;
                width: 100% !important;
            }
            .text-white { color: white !important; }
            .text-gray-500 { color: #888 !important; }
            .text-gray-400 { color: #aaa !important; }
            .text-gray-300 { color: #ccc !important; }
        }
    </style>
<script type="importmap">

  }
}
</script>

</head>

</body>
</html>
